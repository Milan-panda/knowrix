services:
  backend:
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT}:8000"

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_PORT}:3000"

  postgres:
    ports:
      - "${POSTGRES_EXPOSED_PORT}:5432"

  qdrant:
    ports:
      - "${QDRANT_EXPOSED_PORT}:6333"

  minio:
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
