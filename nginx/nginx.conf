events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name xuno.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name xuno.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/xuno.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xuno.duckdns.org/privkey.pem;

        location / {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Required for SSE streaming (chat responses)
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
        }
    }
}
