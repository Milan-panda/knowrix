server {
    listen 80;
    server_name api.contextiq.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.contextiq.dev;

    ssl_certificate     /etc/letsencrypt/live/api.contextiq.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.contextiq.dev/privkey.pem;

    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE streaming (chat responses)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}
